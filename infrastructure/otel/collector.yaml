# infrastructure/otel/collector.yaml
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 20
  # §10 §6 强制 100% 保留 LLM span
  # 注:composite.max_or 是 v0.97+ 语法;v0.96.0 用多 policies 同样 OR 语义
  tail_sampling:
    decision_wait: 10s
    num_traces: 100000
    policies:
      - name: keep-llm
        type: string_attribute
        string_attribute:
          key: llm.model
          values: [".+"]
      - name: keep-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: probabilistic
        type: probabilistic
        probabilistic:
          sampling_percentage: 100  # §10 决策:单机默认 100%

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, batch]
      exporters: [otlp/tempo]

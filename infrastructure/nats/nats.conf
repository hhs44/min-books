# infrastructure/nats/nats.conf
server_name: minbook-nats

# JetStream 启用
jetstream {
    store_dir: /data
    max_mem: 1G
    max_file: 5G
}

# HTTP 监控端口
http_port: 8222

# 日志(写到 stdout,符合容器最佳实践)
logtime: true
debug: false
trace: false

# 客户端连接限制
max_connections: 100
max_payload: 10MB  # §18 G7 修复:从 2MB 调到 10MB

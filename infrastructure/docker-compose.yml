# infrastructure/docker-compose.yml
name: minbook

services:
  # === 基础设施(数据/事件/缓存) ===
  postgres:
    build: ./postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minbook}
      POSTGRES_USER: ${POSTGRES_USER:-minbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minbook_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minbook} -d ${POSTGRES_DB:-minbook}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  nats:
    image: nats:2.10-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - natsdata:/data
    ports:
      - "127.0.0.1:4222:4222"   # client
      - "127.0.0.1:8222:8222"   # monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s

  # === 可观测性(§10) ===
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/collector.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on: [tempo]

  tempo:
    image: grafana/tempo:2.4.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempodata:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on: [tempo]

  # === 4 个基础设施服务(plan v2)===
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
      args:
        SERVICE_NAME: gateway
    environment:
      OTEL_SERVICE_NAME: gateway
      SERVICE_PORT: "8000"
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_SECRET: ${SERVICE_SECRET}
      ALLOW_LOOPBACK_BYPASS: ${ALLOW_LOOPBACK_BYPASS:-true}
    env_file: ../.env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      nats:     { condition: service_healthy }
      otel-collector: { condition: service_started }
      pipeline-orchestrator: { condition: service_started }

  state-service:
    build:
      context: ..
      dockerfile: services/state-service/Dockerfile
      args:
        SERVICE_NAME: state-service
    environment:
      OTEL_SERVICE_NAME: state-service
      SERVICE_PORT: "8007"
      SERVICE_SECRET: ${SERVICE_SECRET}
    env_file: ../.env
    ports:
      - "127.0.0.1:8007:8007"
    depends_on:
      postgres: { condition: service_healthy }
      nats:     { condition: service_healthy }
      otel-collector: { condition: service_started }

  llm-gateway:
    build:
      context: ..
      dockerfile: services/llm-gateway/Dockerfile
      args:
        SERVICE_NAME: llm-gateway
    environment:
      OTEL_SERVICE_NAME: llm-gateway
      SERVICE_PORT: "8006"
      SERVICE_SECRET: ${SERVICE_SECRET}
    env_file: ../.env
    ports:
      - "127.0.0.1:8006:8006"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      nats:     { condition: service_healthy }
      otel-collector: { condition: service_started }

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
      args:
        SERVICE_NAME: notification-service
    environment:
      OTEL_SERVICE_NAME: notification-service
      SERVICE_PORT: "8008"
      SERVICE_SECRET: ${SERVICE_SECRET}
    env_file: ../.env
    ports:
      - "127.0.0.1:8008:8008"
    depends_on:
      postgres: { condition: service_healthy }
      nats:     { condition: service_healthy }
      otel-collector: { condition: service_started }

  # === 3 个 agent 服务(plan v3)===
  agent-planner-service:
    build:
      context: ..
      dockerfile: services/agent-planner/Dockerfile
      args:
        SERVICE_NAME: agent-planner
    environment:
      OTEL_SERVICE_NAME: agent-planner-service
      SERVICE_PORT: "8003"
      SERVICE_SECRET: ${SERVICE_SECRET}
    env_file: ../.env
    ports:
      - "127.0.0.1:8003:8003"
    depends_on:
      postgres: { condition: service_healthy }
      nats:     { condition: service_healthy }
      otel-collector: { condition: service_started }
      llm-gateway: { condition: service_started }
      state-service: { condition: service_started }

  agent-writer-service:
    build:
      context: ..
      dockerfile: services/agent-writer/Dockerfile
      args:
        SERVICE_NAME: agent-writer
    environment:
      OTEL_SERVICE_NAME: agent-writer-service
      SERVICE_PORT: "8004"
      SERVICE_SECRET: ${SERVICE_SECRET}
    env_file: ../.env
    ports:
      - "127.0.0.1:8004:8004"
    depends_on:
      postgres: { condition: service_healthy }
      nats:     { condition: service_healthy }
      otel-collector: { condition: service_started }
      llm-gateway: { condition: service_started }
      state-service: { condition: service_started }

  agent-reviewer-service:
    build:
      context: ..
      dockerfile: services/agent-reviewer/Dockerfile
      args:
        SERVICE_NAME: agent-reviewer
    environment:
      OTEL_SERVICE_NAME: agent-reviewer-service
      SERVICE_PORT: "8005"
      SERVICE_SECRET: ${SERVICE_SECRET}
    env_file: ../.env
    ports:
      - "127.0.0.1:8005:8005"
    depends_on:
      postgres: { condition: service_healthy }
      nats:     { condition: service_healthy }
      otel-collector: { condition: service_started }
      llm-gateway: { condition: service_started }
      state-service: { condition: service_started }

  # === 编排服务(plan v4)===
  pipeline-orchestrator:
    build:
      context: ..
      dockerfile: services/pipeline-orchestrator/Dockerfile
      args:
        SERVICE_NAME: pipeline-orchestrator
    environment:
      OTEL_SERVICE_NAME: pipeline-orchestrator
      SERVICE_PORT: "8002"
      SERVICE_SECRET: ${SERVICE_SECRET}
    env_file: ../.env
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      postgres: { condition: service_healthy }
      nats:     { condition: service_healthy }
      otel-collector: { condition: service_started }
      agent-planner-service:   { condition: service_started }
      agent-writer-service:    { condition: service_started }
      agent-reviewer-service:  { condition: service_started }

  # === 反向代理(plan v5 之前)===
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - gateway

volumes:
  pgdata:
  natsdata:
  tempodata:
  grafanadata:
